<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B0D" />
    
    <!-- SEO Primary Meta Tags -->
    <title>3D THREADZ — Premium Luxury Streetwear</title>
    <meta name="description" content="Discover premium oversized tees, graphic prints, and custom apparel by 3D Threadz. Designed with precision, built for the next generation of streetwear." />
    <meta name="keywords" content="3D Threadz, premium streetwear, luxury fashion, oversized tees, custom printed tees, Pakistan fashion brand" />
    <link rel="canonical" href="https://3dthreadz.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://3dthreadz.com/" />
    <meta property="og:title" content="3D THREADZ — Premium Luxury Streetwear" />
    <meta property="og:description" content="Discover premium oversized tees, graphic prints, and custom apparel by 3D Threadz." />
    <meta property="og:image" content="https://3dthreadz.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://3dthreadz.com/" />
    <meta property="twitter:title" content="3D THREADZ — Premium Luxury Streetwear" />
    <meta property="twitter:description" content="Discover premium oversized tees, graphic prints, and custom apparel by 3D Threadz." />
    <meta property="twitter:image" content="https://3dthreadz.com/og-image.jpg" />

    <!-- Preconnect for Fonts Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon Placeholders -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- JSON-LD Structured Data / Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "3D Threadz",
        "description": "Premium luxury streetwear brand offering custom-designed tees and apparel.",
        "url": "https://3dthreadz.com",
        "telephone": "",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "PK"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
